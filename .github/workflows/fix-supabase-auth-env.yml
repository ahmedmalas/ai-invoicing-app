name: Fix Supabase Auth env on Vercel

# On-demand workflow: if VERCEL_TOKEN + SUPABASE_ANON_KEY are present in repo secrets,
# rewrite Preview + Production SUPABASE_* env vars to the production Auth project
# (https://ntkctiqyvjcjokclkmll.supabase.co). Keys are never hardcoded in source.
on:
  workflow_dispatch:
  push:
    branches:
      - cursor/rebuild-invoice-workspace-93ed
    paths:
      - 'ai-invoicing-app-standalone/scripts/fix-vercel-supabase-env.mjs'
      - '.github/workflows/fix-supabase-auth-env.yml'

jobs:
  patch-env:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-invoicing-app-standalone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Patch Vercel Supabase Auth env
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: team_oV08U3snaxnxaI70873bYDka
          VERCEL_PROJECT_ID: prj_o3Kmm3okLf1jo4LHNVdIJqsUQAV9
          SUPABASE_URL: https://ntkctiqyvjcjokclkmll.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret is not configured; skipping env patch."
            exit 0
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_ANON_KEY secret is not configured; skipping env patch."
            exit 0
          fi
          node scripts/fix-vercel-supabase-env.mjs
